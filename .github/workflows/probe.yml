# PDB API 엔드포인트 탐침용 (임시) — 러너에서 실제 응답을 확인한다
name: PDB API probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: probe endpoints
        run: |
          probe() {
            echo "=== $1"
            code=$(curl -sS -o /tmp/out -w "%{http_code}" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0" -H "Accept: application/json" --max-time 15 "$1" || echo ERR)
            echo "status: $code"
            head -c 700 /tmp/out; echo; echo
          }
          probe "https://api.personality-database.com/api/v1/search/top?keyword=aespa&limit=5"
          probe "https://api.personality-database.com/api/v1/search/top?query=aespa&limit=5"
          probe "https://api.personality-database.com/api/v2/search/top?keyword=aespa&limit=5"
          probe "https://api.personality-database.com/api/v1/search?query=aespa&limit=5"
          probe "https://api.personality-database.com/api/v2/search?query=aespa&limit=5&nextCursor=0"
          probe "https://api.personality-database.com/api/v1/profiles?keyword=aespa&limit=5"
          probe "https://api.personality-database.com/api/v2/profiles?keyword=aespa&limit=5"
          probe "https://www.personality-database.com/api/v1/search/top?keyword=aespa&limit=5"
          echo "=== website search page (__NEXT_DATA__ 확인)"
          curl -sS -o /tmp/page -w "status:%{http_code}\n" -A "Mozilla/5.0" --max-time 20 "https://www.personality-database.com/search?keyword=aespa" || true
          grep -o '"personality_type"[^,]*' /tmp/page | head -5 || true
          grep -o 'api[^"]*search[^"]*' /tmp/page | head -10 || true
          head -c 1200 /tmp/page; echo
