# PDB 접근 탐침 v2 (임시) — 실제 브라우저로 Cloudflare 통과 여부 + 진짜 API 주소 확인
name: PDB API probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: setup
        run: |
          pip install playwright >/dev/null
          playwright install --with-deps chromium >/dev/null 2>&1 || playwright install chromium
      - name: browser probe
        run: |
          python3 - <<'PY'
          from playwright.sync_api import sync_playwright
          UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                "(KHTML, like Gecko) Chrome/126.0 Safari/537.36")
          captured = []
          with sync_playwright() as p:
              b = p.chromium.launch(args=["--disable-blink-features=AutomationControlled"])
              pg = b.new_page(user_agent=UA, locale="en-US")
              pg.on("response", lambda r: captured.append((r.status, r.url))
                    if ("api" in r.url or "search" in r.url or "profile" in r.url) else None)
              try:
                  pg.goto("https://www.personality-database.com/search?keyword=aespa",
                          timeout=45000, wait_until="domcontentloaded")
                  pg.wait_for_timeout(10000)
                  print("TITLE:", pg.title())
                  body = pg.inner_text("body")[:600].replace("\n", " | ")
                  print("BODY:", body)
              except Exception as e:
                  print("GOTO ERROR:", e)
              print("--- captured api-ish responses ---")
              for s, u in captured[:50]:
                  print(s, u[:200])
              b.close()
          PY
