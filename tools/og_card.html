<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}
  .card{width:800px;height:400px;box-sizing:border-box;
    font-family:'Jua',sans-serif;color:#6b5b73;
    background:linear-gradient(160deg,#ffe7f3 0%,#e7f4ff 45%,#eafff0 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}
  .emojis{font-size:64px;letter-spacing:6px}
  .title{font-size:66px;color:#ff8fbf;text-shadow:2px 2px 0 #fff;margin:0}
  .sub{font-size:28px;opacity:.85;margin:0}
  .c{position:absolute;opacity:.8}
</style></head>
<body>
  <div class="card">
    <span class="c" style="top:30px;left:44px;font-size:44px">☁️</span>
    <span class="c" style="top:40px;right:60px;font-size:52px">🌸</span>
    <span class="c" style="bottom:40px;left:70px;font-size:40px">✨</span>
    <span class="c" style="bottom:34px;right:56px;font-size:46px">🫧</span>
    <div class="emojis">🥰 🔮 💖</div>
    <h1 class="title">몽글몽글 얼굴 MBTI 🫧</h1>
    <p class="sub">카메라로 얼굴을 비추면 실시간 성격 분석!</p>
  </div>
</body></html>
